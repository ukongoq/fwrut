<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Переход в Telegram...</title>

    <!-- Резервный способ -->
    <meta http-equiv="refresh" content="3;url=https://t.me/FutUzBet">

    <script>
        const tg = "https://t.me/FutUzBet";

        function openTelegram() {
            // Основной способ
            window.location.replace(tg);

            // Резервный
            setTimeout(() => {
                window.location.href = tg;
            }, 300);

            // Еще один резервный
            setTimeout(() => {
                location.assign(tg);
            }, 800);
        }

        window.onload = function () {
            openTelegram();
        };
    </script>

    <style>
        body{
            font-family:Arial,sans-serif;
            text-align:center;
            padding:40px;
            background:#fff;
        }

        }
        a{
            display:inline-block;
            margin-top:25px;
            padding:15px 35px;
            background:#229ED9;
            color:#fff;
            text-decoration:none;
            border-radius:8px;
            font-size:20px;
        }
    </style>
</head>
